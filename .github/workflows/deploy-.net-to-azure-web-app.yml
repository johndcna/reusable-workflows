name: Deploy Azure App Service
on:
  workflow_call:
    inputs: 
      artifact_name:
        description: 'Set the artifact name'
        required: true
        type: string
      target_app_name:
        description: 'Set the target App Name'
        required: true
        type: string
    secrets:
      target_publish_profile:
        required: true
      subscription_id:
        description: 'Azure Subscription ID'
        required: true
      azure_client_id:
        description: 'Azure client ID'
        required: true
      azure_tenant_id:
        description: 'Azure tenant ID'
        required: true
permissions:
  id-token: write
  contents: read
  
jobs:
  deploy-app-service:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure CLI script
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show
        
      - name: Azure Web App Deploy
        uses: azure/webapps-deploy@v2
        with:
          # Name of the App Service
          app-name: ${{ inputs.APP_NAME }}
          publish-profile: ${{ secrets.target_publish_profile }}
