name: Deploy Azure App Service
on:
  workflow_call:
    inputs: 
      artifact_name:
        description: 'Set the artifact name'
        required: true
        type: string
      target_app_name:
        description: 'Set the target App Name'
        required: true
        type: string 
    secrets:
      target_publish_profile:
        required: true
      subscription_id:
        required: true
      azure_client_id:
        required: true
      azure_tenant_id:
        required: true
permissions:
  id-token: write
  contents: read
  
jobs:
  deploy-app-service:
    runs-on: ubuntu-latest
    steps:
      - name: Echo secret
        run: |
            echo "This is a secret: ${{ vars.azure_client_id }}"
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: '921afbfe-b2c3-4d0b-b2eb-ec131101e2d1'
          tenant-id: 'f4acf4b0-d8ce-47de-9567-63bdeee62d4e'
          subscription-id: '6c8cd46b-6887-4cba-8596-a38ceeabd610'

      - name: Azure CLI script
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show
        
      - name: Azure Web App Deploy
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'Cenamon'
          publish-profile: ${{ inputs.target_publish_profile }}

